<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Botanical detail photography placeholder</title>
  <desc id="desc">A pastel macro-style botanical composition with leaves and light.</desc>
  <defs>
    <radialGradient id="glow" cx="65%" cy="30%" r="70%">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.4" stop-color="#f7dfe5"/>
      <stop offset="1" stop-color="#d9e9de"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="url(#glow)"/>
  <g fill="none" stroke="#4f857c" stroke-linecap="round" opacity="0.76">
    <path d="M245 850 C325 650 315 410 485 185" stroke-width="14"/>
    <path d="M775 875 C740 625 820 400 1065 110" stroke-width="14"/>
    <path d="M1030 900 C1045 660 1105 505 1260 360" stroke-width="11"/>
  </g>
  <g fill="#eef7f4" stroke="#4f857c" stroke-width="8" opacity="0.82">
    <ellipse cx="390" cy="365" rx="155" ry="70" transform="rotate(-35 390 365)"/>
    <ellipse cx="310" cy="555" rx="135" ry="60" transform="rotate(25 310 555)"/>
    <ellipse cx="875" cy="395" rx="170" ry="72" transform="rotate(-28 875 395)"/>
    <ellipse cx="960" cy="570" rx="150" ry="68" transform="rotate(30 960 570)"/>
    <ellipse cx="1165" cy="515" rx="118" ry="52" transform="rotate(-23 1165 515)"/>
  </g>
  <circle cx="1065" cy="175" r="155" fill="#ffffff" opacity="0.22"/>
  <circle cx="550" cy="220" r="62" fill="#ffffff" opacity="0.18"/>
  <rect width="1400" height="900" filter="url(#grain)" opacity="0.42"/>
</svg>
